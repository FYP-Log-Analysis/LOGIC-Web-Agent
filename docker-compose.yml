services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: logic-webagent-api
    ports:
      - "4000:4000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: logic-webagent-dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data:ro
      - ./dashboard:/app
    depends_on:
      - api
    environment:
      - API_BASE_URL=http://api:4000

volumes:
  pgdata:
