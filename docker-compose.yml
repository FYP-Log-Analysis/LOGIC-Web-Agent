services:
  api:
    build:
      context: .                  # project root — gives access to all pipeline modules
      dockerfile: api/Dockerfile
    container_name: logic-webagent-api
    ports:
      - "4000:4000"
    volumes:
      - ./data:/app/data          # persist detection results + SQLite DB between runs
    env_file:
      - path: .env
        required: false           # won't fail if .env doesn't exist yet
    environment:
      - PYTHONPATH=/app
      - LM_STUDIO_BASE_URL=${LM_STUDIO_BASE_URL:-http://host.docker.internal:1234/v1}
      - LM_STUDIO_MODEL=${LM_STUDIO_MODEL:-local-model}
      # GROQ_API_KEY is loaded from .env via env_file above — do NOT duplicate here
      # as an empty shell var would silently override the .env value.
      # CRS INTEGRATION: URL of the ModSecurity CRS detection service (nginx listens on 8080)
      - CRS_SERVICE_URL=${CRS_SERVICE_URL:-http://crs-detector:8080}
      - CRS_AUDIT_LOG=/app/data/crs_audit/audit.log
      - CRS_PARANOIA_LEVEL=${CRS_PARANOIA_LEVEL:-1}
      - CRS_BATCH_SIZE=${CRS_BATCH_SIZE:-100}
      - CRS_FLUSH_WAIT=${CRS_FLUSH_WAIT:-5}
    restart: unless-stopped
    mem_limit: 2g
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: logic-webagent-frontend
    ports:
      - "3001:3000"
    depends_on:
      - api
    environment:
      - API_BASE_URL=http://api:4000
      - NODE_ENV=production
    restart: unless-stopped
    mem_limit: 512m

  # ── CRS INTEGRATION: OWASP ModSecurity CRS in DetectionOnly mode ──────────
  # Internal service only — no host ports exposed.
  # Reachable from api/pipeline containers at http://crs-detector:80.
  # Paranoia level is configurable via CRS_PARANOIA_LEVEL env var (default 1).
  crs-detector:
    image: owasp/modsecurity-crs:nginx-alpine
    container_name: logic-crs-detector
    ports:
      - "8080:80"  # expose to host for run_dev.sh; set CRS_SERVICE_URL=http://localhost:8080 in .env
    volumes:
      - ./data/crs_audit:/var/log/modsec        # shared audit log (JSON) for crs_processor.py
      - ./data/crs_rules:/etc/modsecurity.d/owasp-crs/custom-rules  # future rule overrides
    environment:
      # Run in detection-only mode — never blocks requests, only logs matches
      - MODSEC_RULE_ENGINE=DetectionOnly
      # Write audit log as JSON to the shared volume so crs_processor.py can parse it
      - MODSEC_AUDIT_LOG=/var/log/modsec/audit.log
      - MODSEC_AUDIT_LOG_FORMAT=JSON
      # Only audit transactions where at least one rule matched
      - MODSEC_AUDIT_ENGINE=RelevantOnly
      # Include all audit log sections: headers, body, matched rules, etc.
      - MODSEC_AUDIT_LOG_PARTS=ABCFHKZ
      # Paranoia level — change via CRS_PARANOIA_LEVEL env var (1 = fewest false positives)
      - CRS_PL=${CRS_PARANOIA_LEVEL:-1}
      # Raise anomaly thresholds so nothing is blocked even if CRS wants to
      - ANOMALY_INBOUND=99999
      - ANOMALY_OUTBOUND=99999
    restart: unless-stopped
    mem_limit: 256m

  grafana:
    image: grafana/grafana-oss:10.4.2
    container_name: logic-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-logic1234}
      - GF_INSTALL_PLUGINS=yesoreyeram-infinity-datasource
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - api
    restart: unless-stopped
    mem_limit: 256m

volumes:
  grafana_data:
