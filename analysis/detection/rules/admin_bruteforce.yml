title: Admin Panel Brute-Force / Probing
id: web-004
description: Repeated requests to admin or login endpoints — possible brute-force
level: medium
tags:
  - attack.t1110
detection:
  fields:
    - request_path
  keywords:
    - /wp-login
    - /wp-admin
    - /admin
    - /login
    - /.env
    - /phpmyadmin
    - /adminer
    - /manager/html
    - /jenkins
    - /grafana
  conditions:
    method: POST
  logic: all
