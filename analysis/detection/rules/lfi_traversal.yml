title: Local File Inclusion (LFI) / Path Traversal
id: web-003
description: Directory traversal and LFI attempts via path manipulation
level: critical
tags:
  - attack.t1083
detection:
  fields:
    - request_path
    - query_string
  patterns:
    - "\\.\\./\\.\\.|%2e%2e%2f|%2e%2e/|\\.%2f"
    - "/etc/(passwd|shadow|hosts|group|hostname)"
    - "/proc/self/(environ|fd|cmdline)"
    - "(boot\\.ini|win\\.ini|system32)"
    - "php://input|php://filter|expect://"
  logic: any
