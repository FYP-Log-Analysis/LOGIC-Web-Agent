title: SQL Injection Attempt
id: web-001
description: Detects common SQL injection patterns in URL paths and query strings
level: high
tags:
  - attack.initial_access
  - attack.t1190
detection:
  fields:
    - request_path
    - query_string
  patterns:
    - "('|%27|%22).*(or|and|union|select|insert|drop|update|delete|exec|cast|convert)\\b"
    - "\\b(union\\s+select|select\\s+.*from|insert\\s+into|drop\\s+table)\\b"
    - "(;|%3b).*(select|drop|insert|update|delete)\\b"
    - "--\\s*(\\w|$)|%23|/\\*.*\\*/"
  logic: any
