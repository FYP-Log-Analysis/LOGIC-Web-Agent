title: Sensitive File Exposure Probe
id: web-005
description: Requests for environment files, backups, git repos, or config files
level: high
tags:
  - attack.t1083
  - attack.discovery
detection:
  fields:
    - request_path
  keywords:
    - /.env
    - /.git/
    - /config.php
    - /wp-config.php
    - /database.yml
    - /settings.py
    - /application.properties
    - /.htpasswd
    - /.htaccess
    - /backup
    - /dump.sql
    - /db.sqlite
  logic: any
